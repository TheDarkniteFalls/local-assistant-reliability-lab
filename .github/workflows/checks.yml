name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 check_toolkit_index.py
      - run: python3 -B run_complete_workflow.py --self-test
      - run: python3 -m py_compile check_toolkit_index.py run_complete_workflow.py
